<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>아이티동스쿨 강좌 카테고리 (비공식 런처)</title>
<style>
  :root{
    --green:#217346; --green-d:#1a5c38; --grid:#d0d0d0; --head:#f3f3f3;
    --ink:#1a1a1a; --muted:#5f6b66; --link:#0563c1; --sel:#e6f1ea; --app:#e6e6e6;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{
    background:var(--app); color:var(--ink);
    font-family:"Calibri","Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    font-size:14px; display:flex; justify-content:center;
    padding:18px 12px;
  }
  .xl{width:100%; max-width:860px; background:#fff; border:1px solid #c4c4c4;
    box-shadow:0 1px 4px rgba(0,0,0,.12); display:flex; flex-direction:column;
    height:calc(100vh - 36px); min-height:480px; overflow:hidden; border-radius:3px}

  /* 타이틀바 */
  .titlebar{background:var(--green); color:#fff; display:flex; align-items:center;
    gap:10px; padding:8px 12px; flex:none}
  .titlebar .ico{width:16px; height:16px; background:#fff; border-radius:2px;
    position:relative; flex:none}
  .titlebar .ico::after{content:""; position:absolute; inset:3px; background:var(--green);
    clip-path:polygon(0 0,45% 0,45% 45%,100% 45%,100% 100%,0 100%)}
  .titlebar .fname{font-weight:600; font-size:13px}
  .titlebar .tag{margin-left:auto; font-size:10.5px; background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.35); border-radius:3px; padding:1px 7px}

  /* 수식줄 */
  .fbar{display:flex; align-items:center; gap:0; border-bottom:1px solid var(--grid);
    background:#fafafa; flex:none}
  .namebox{width:108px; padding:5px 8px; border-right:1px solid var(--grid);
    font-weight:600; color:var(--green-d); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .fcell{flex:1; padding:5px 10px; color:var(--muted); font-size:13px;
    display:flex; gap:10px; align-items:center; min-width:0}
  .fcell a{color:var(--link); text-decoration:none; white-space:nowrap}
  .fcell a:hover{text-decoration:underline}

  /* 그리드 */
  .grid-wrap{flex:1; overflow:auto}
  table{border-collapse:collapse; width:100%; table-layout:fixed}
  col.gut{width:42px} col.a{width:auto} col.b{width:150px}
  th,td{border:1px solid var(--grid); padding:0}
  thead .col{background:var(--head); text-align:center; font-weight:600; color:#444;
    height:22px; font-size:12px; position:sticky; top:0; z-index:2}
  .gutter{background:var(--head); text-align:center; color:#888; font-size:12px; width:42px}
  thead .corner{background:#eaeaea; position:sticky; top:0; z-index:3}
  tbody .hdr td{background:#eef4f0; font-weight:700; color:var(--green-d); padding:7px 10px}
  td.cell{padding:0}
  td.cell a{display:block; padding:7px 10px; color:var(--link); text-decoration:none;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  td.b a{color:var(--muted); font-size:12.5px}
  tbody tr.row:hover td{background:var(--sel)}
  tbody tr.row:hover td.cell a{color:var(--green-d)}
  td.cell a:focus{outline:2px solid var(--green); outline-offset:-2px}

  /* 시트탭 */
  .tabs{display:flex; align-items:stretch; gap:2px; background:#f0f0f0;
    border-top:1px solid var(--grid); padding:0 6px; flex:none; overflow-x:auto}
  .tab{border:1px solid var(--grid); border-top:0; background:#e9e9e9; color:#555;
    padding:7px 16px; font-size:13px; cursor:pointer; white-space:nowrap;
    border-radius:0 0 4px 4px}
  .tab[aria-selected="true"]{background:#fff; color:var(--green-d); font-weight:700;
    border-top:2px solid var(--green); margin-top:-1px}

  /* 상태바 */
  .statusbar{background:var(--head); border-top:1px solid var(--grid); color:var(--muted);
    font-size:11.5px; padding:5px 12px; display:flex; gap:12px; align-items:center;
    flex:none; flex-wrap:wrap}
  .statusbar a{color:var(--link); text-decoration:none}
  .statusbar a:hover{text-decoration:underline}
  .statusbar .sp{margin-left:auto}
</style>
</head>
<body>
<div class="xl" role="application" aria-label="아이티동스쿨 강좌 카테고리">

  <div class="titlebar">
    <span class="ico" aria-hidden="true"></span>
    <span class="fname">itsdong_강좌_카테고리.xlsx</span>
    <span class="tag">비공식 · UNOFFICIAL</span>
  </div>

  <div class="fbar">
    <div class="namebox" id="namebox">A1</div>
    <div class="fcell">
      <span id="fcaption">아이티동스쿨 강좌 분류 — 셀을 클릭하면 공식 페이지로 이동합니다</span>
      <a id="viewAll" href="#" target="_blank" rel="noopener nofollow"></a>
    </div>
  </div>

  <div class="grid-wrap">
    <table>
      <colgroup><col class="gut"><col class="a"><col class="b"></colgroup>
      <thead>
        <tr>
          <th class="corner"></th>
          <th class="col">A</th>
          <th class="col">B</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="tabs" id="tabs" role="tablist" aria-label="대분류 시트"></div>

  <div class="statusbar">
    <span>비공식 런처 · 강좌 데이터를 저장하지 않습니다. 모든 링크는 itsdong.com 공식 페이지로 연결됩니다.</span>
    <span class="sp"></span>
    <a href="https://www.itsdong.com/it/index.php" target="_blank" rel="noopener nofollow">공식 사이트 ↗</a>
    <a href="https://github.com/JTech-CO/itsdong-course-indexer" target="_blank" rel="noopener">GitHub ↗</a>
    <a href="https://github.com/JTech-CO/itsdong-course-indexer/blob/main/NOTICE.md" target="_blank" rel="noopener">고지 ↗</a>
  </div>
</div>

<script id="catData" type="application/json">[{"id":"1","name":"프로그래밍","subs":[["10","[특별할인] 프리패스"],["11","C / C++ / C# / JAVA / VB / RUST"],["12","안드로이드 / 아이폰"],["13","웹프로그래밍"],["14","R / 하둡 / 파이썬 / Scratch / MATLAB"],["15","데이터베이스"],["19","판다스"],["16","라즈베리파이"],["17","아두이노"],["18","AI / 딥러닝 프로그래밍"]]},{"id":"2","name":"그래픽","subs":[["20","[특별할인] 프리패스"],["21","포토샵 / 일러스트 / 익스프레스"],["22","프리미어 / 애펙 / 베가스"],["23","인디자인 / 오토캐드"],["24","3ds Max / 마야 / 라이노"],["26","지브러시 / 시네마4D"],["27","스케치업 / 라이트룸"],["29","3D 프린팅"],["28","게임캐릭터 그리기"],["25","기타 그래픽"]]},{"id":"3","name":"컴퓨터일반","subs":[["30","[특별할인] 프리패스"],["31","오피스"],["34","운영체제"],["32","스마트폰 / SNS"],["33","인터넷 / 컴퓨터일반"],["35","AI(인공지능) 툴"],["36","메타버스"]]},{"id":"4","name":"자격증","subs":[["40","[특별할인] 프리패스"],["45","사무자동화 / 컴퓨터그래픽"],["43","ITQ / GTQ / AI-POT"],["41","컴퓨터활용능력"],["421","워드프로세서"],["44","MOS / E-Test"],["46","정보처리(프로그래밍)"],["47","정보보안 / 컴퓨터시스템"],["49","네트워크관리사"],["422","웹디자인개발기능사"],["423","COS(Coding Specialist)"],["424","데이터분석 준전문가(ADsP)"],["425","데이터분석 전문가(ADP)"],["427","SQL개발자 (SQLD)"],["428","ACA국제자격증"],["426","세무/회계 자격증"],["429","경영정보시각화능력"],["48","기타 자격증"]]}]</script>

<script>
"use strict";
const BASE = "https://www.itsdong.com/it/lecture.php?category=";
const SHEETS = JSON.parse(document.getElementById("catData").textContent);
const tbody = document.getElementById("tbody");
const tabsEl = document.getElementById("tabs");
const nameBox = document.getElementById("namebox");
const viewAll = document.getElementById("viewAll");
let active = 0;

function render(i){
  active = i;
  const sheet = SHEETS[i];
  // 시트탭
  [...tabsEl.children].forEach((t, k) => t.setAttribute("aria-selected", k === i));
  // 수식줄
  nameBox.textContent = sheet.name;
  viewAll.textContent = sheet.name + " 전체 보기 ↗";
  viewAll.href = BASE + sheet.id;
  // 본문
  tbody.innerHTML = "";
  // 헤더 행 (엑셀 1행)
  const h = document.createElement("tr");
  h.className = "hdr";
  h.innerHTML = '<th class="gutter">1</th><td>소분류 (강좌 분류)</td><td>공식 페이지</td>';
  tbody.appendChild(h);
  // 데이터 행
  sheet.subs.forEach(([cid, nm], idx) => {
    const url = BASE + cid;
    const tr = document.createElement("tr");
    tr.className = "row";
    const g = document.createElement("th");
    g.className = "gutter"; g.textContent = idx + 2;
    const a = document.createElement("td"); a.className = "cell a";
    const la = document.createElement("a");
    la.href = url; la.target = "_blank"; la.rel = "noopener nofollow"; la.textContent = nm;
    a.appendChild(la);
    const b = document.createElement("td"); b.className = "cell b";
    const lb = document.createElement("a");
    lb.href = url; lb.target = "_blank"; lb.rel = "noopener nofollow"; lb.textContent = "열기 ↗";
    b.appendChild(lb);
    tr.append(g, a, b);
    tbody.appendChild(tr);
  });
}

// 시트탭 생성
SHEETS.forEach((s, i) => {
  const t = document.createElement("button");
  t.className = "tab"; t.type = "button"; t.role = "tab"; t.textContent = s.name;
  t.onclick = () => render(i);
  tabsEl.appendChild(t);
});
render(0);
</script>
</body>
</html>
